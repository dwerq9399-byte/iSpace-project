<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Каталог товаров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">iSpace</div>
        <nav class="nav">
            <a href="index.html">Главная</a>
            <a href="catalog.html" class="active">Каталог</a>

            <a href="akk.html">Кабинет</a>

    <main>
        <!-- Раздел товаров 1 -->
        <section class="catalog-section">
            <h2>Популярные товары</h2>
            <div class="grid-container">
                <div class="product-card">
                    <img src="orig.webp" alt="Товар">
                    <h3>Смартфон</h3>
                    <p>Цена: 49 990 ₽</p>
                    <button class="btn">Купить</button>
                </div>
                <div class="product-card">
                    <img src="telephone.avif" alt="Товар">
                    <h3>Ноутбук</h3>
                    <p>Цена: 89 990 ₽</p>
                    <button class="btn">Купить</button>
                </div>
            </div>
        </section>

        <!-- Раздел товаров 2 -->
        <section class="catalog-section">
            <h2>Аксессуары</h2>
            <div class="grid-container">
                <div class="product-card">
                    <img src="hxww.jpg" alt="Товар">
                    <h3>Наушники</h3>
                    <p>Цена: 11 990 ₽</p>
                    <button class="btn">Купить</button>
                </div>
                <div class="product-card">
                    <img src="fledfl.avif" alt="Товар">
                    <h3>Чехол</h3>
                    <p>Цена: 990 ₽</p>
                    <button class="btn">Купить</button>
                </div>
            </div>
        </section>

    <footer class="footer">
        <div class="footer-logo">iSpace &copy; 2026</div>
        <div class="footer-links">
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="feedback.html">Отзывы</a>
            <a href="akk.html">Кабинет</a>

            <a href="#">Политика конфиденциальности</a>
        </div>
        <div class="socials">
            <a href="#">ВКонтакте</a>
            <a href="#">Telegram</a>
            <a href="#">YouTube</a>
        </div>
    </footer>
</body>
</html>
