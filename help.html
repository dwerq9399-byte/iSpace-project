<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помощь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">iSpace</div>
        <nav class="nav">
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="feedback.html">Отзывы</a>
            <a href="akk.html">Кабинет</a>
            <a href="help.html" class="active">Помощь</a>
        </nav>
    </header>

    <main>
        <!-- Форма обратной связи -->
        <section class="help-section">
            <h2>Служба поддержки</h2>
            <form class="help-form" onsubmit="handleFormSubmit(event)">
                <label for="problem">С какой проблемой вы столкнулись при покупке?</label>
                <select id="problem" required>
                    <option value="">-- Выберите вариант --</option>
                    <option value="payment">Не проходит оплата</option>
                    <option value="delivery">Проблемы с доставкой</option>
                    <option value="lk">Не заходит в личный кабинет</option>
                    <option value="other">Другой вопрос</option>
                </select>

                <textarea placeholder="Опишите вашу проблему подробно..." rows="5" required></textarea>
                
                <button type="submit" class="btn">Пожаловаться и связаться</button>
            </form>
        </section>

        <!-- Обязательный второй блок контента + JS Элемент (Интерактивный FAQ) -->
        <section class="faq-section">
            <h2>Часто задаваемые вопросы</h2>
            <div class="faq-item">
                <button class="faq-toggle" onclick="toggleFaq()">👉 Кликните, чтобы узнать условия возврата</button>
                <p id="faq-content" class="faq-content hidden">Вы можете вернуть любой товар в течение 14 дней с момента покупки при сохранении товарного вида.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-logo">iSpace &copy; 2026</div>
        <div class="footer-links">
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="feedback.html">Отзывы</a>
            <a href="akk.html">Кабинет</a>
            <a href="help.html">Помощь</a>
            <a href="#">Политика конфиденциальности</a>
        </div>
        <div class="socials">
            <a href="#">ВКонтакте</a>
            <a href="#">Telegram</a>
            <a href="#">YouTube</a>
        </div>
    </footer>

    <!-- Скрипт JavaScript для интерактивности -->
    <script>
        // Функция для сворачивания/разворачивания FAQ
        function toggleFaq() {
            const content = document.getElementById('faq-content');
            content.classList.toggle('hidden');
        }

        // Функция обработки формы
        function handleFormSubmit(event) {
            event.preventDefault();
            alert('Ваше обращение зарегистрировано! Менеджер свяжется с вами.');
            event.target.reset();
        }
    </script>
</body>
</html>
